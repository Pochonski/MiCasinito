version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS}
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/state').status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE}
    networks:
      - web
    expose:
      - "80"
    restart: unless-stopped

  caddy:
    image: caddy:latest
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    restart: unless-stopped

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
